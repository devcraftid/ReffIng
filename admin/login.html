<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - REFF INK</title>
  <link rel="stylesheet" href="../src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-[100dvh] flex items-center justify-center relative overflow-hidden">
  
  <!-- Decorative background elements -->
  <div class="absolute top-0 right-0 -translate-y-12 translate-x-1/3 opacity-30 -z-10 blur-3xl">
    <div class="w-96 h-96 bg-brand-cyan rounded-full mix-blend-multiply"></div>
  </div>
  <div class="absolute bottom-0 left-0 translate-y-1/3 -translate-x-1/3 opacity-30 -z-10 blur-3xl">
    <div class="w-96 h-96 bg-brand-light-blue rounded-full mix-blend-multiply"></div>
  </div>

  <div class="max-w-md w-full px-6">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white shadow-md mb-4 text-brand-light-blue text-3xl">
        <i class="ph-fill ph-printer"></i>
      </div>
      <h1 class="text-3xl font-bold text-slate-800">Admin Login</h1>
      <p class="text-slate-500 mt-2">Masuk ke panel kontrol REFF INK</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 relative z-10">
      <div id="error-msg" class="hidden bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium mb-6"></div>
      
      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
          <div class="relative">
            <i class="ph-fill ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
            <input type="email" id="email" required class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-light-blue focus:ring-2 focus:ring-brand-light-blue/20 transition">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
          <div class="relative">
            <i class="ph-fill ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
            <input type="password" id="password" required class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-light-blue focus:ring-2 focus:ring-brand-light-blue/20 transition">
          </div>
        </div>
        
        <button type="submit" id="login-btn" class="w-full bg-brand-blue text-white py-3.5 rounded-xl font-bold hover:bg-brand-light-blue transition hover-lift flex items-center justify-center gap-2">
          Masuk <i class="ph-bold ph-arrow-right"></i>
        </button>
      </form>
    </div>
    
    <div class="text-center mt-8">
      <a href="../index.html" class="text-slate-500 hover:text-brand-light-blue font-medium text-sm inline-flex items-center gap-2 transition">
        <i class="ph-bold ph-arrow-left"></i> Kembali ke Website
      </a>
    </div>
  </div>

  <script type="module">
    import { loginAdmin } from '../src/auth.js';

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        btn.disabled = true;
        btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> Memproses...';
        errorMsg.classList.add('hidden');
        
        await loginAdmin(email, password);
        
        // Berhasil login, redirect ke dashboard
        window.location.href = './index.html';
      } catch (error) {
        errorMsg.textContent = "Gagal masuk: " + error.message;
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Masuk <i class="ph-bold ph-arrow-right"></i>';
      }
    });
  </script>
</body>
</html>
