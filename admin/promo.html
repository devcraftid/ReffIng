<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Promo - REFF INK Admin</title>
  <link rel="stylesheet" href="../src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex h-[100dvh] overflow-hidden">

  <!-- Sidebar -->
  <div id="admin-sidebar-overlay" class="fixed inset-0 bg-slate-900/50 z-20 hidden md:hidden backdrop-blur-sm transition-opacity"></div>
  <aside id="admin-sidebar" class="w-64 bg-slate-900 text-slate-300 flex flex-col h-full shrink-0 transition-transform duration-300 fixed md:relative z-30 -translate-x-full md:translate-x-0">
    <div class="h-20 flex items-center px-6 border-b border-slate-800 shrink-0">
      <a href="index.html" class="text-xl font-bold text-white flex items-center gap-2">
        <i class="ph-fill ph-printer text-brand-light-blue"></i> REFF INK Admin
      </a>
    </div>
    
    <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1 custom-scrollbar">
      <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition">
        <i class="ph-bold ph-squares-four text-xl"></i> Dashboard
      </a>
      
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-6 mb-2">Layanan & Harga</p>
      <a href="service.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition">
        <i class="ph-bold ph-receipt text-xl"></i> Data Service Tracking
      </a>
      <a href="layanan.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition">
        <i class="ph-bold ph-list-dashes text-xl"></i> Kelola Layanan
      </a>
      <a href="harga.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition">
        <i class="ph-bold ph-currency-circle-dollar text-xl"></i> Kelola Harga
      </a>
      <a href="promo.html" class="flex items-center gap-3 px-3 py-3 rounded-lg bg-brand-light-blue text-white font-medium">
        <i class="ph-bold ph-ticket text-xl"></i> Kelola Promo
      </a>
      
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-6 mb-2">Informasi Publik</p>
      <a href="galeri.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition">
        <i class="ph-bold ph-images text-xl"></i> Kelola Galeri
      </a>
      <a href="faq.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition">
        <i class="ph-bold ph-question text-xl"></i> Kelola FAQ
      </a>
      <a href="testimoni.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition">
        <i class="ph-bold ph-star text-xl"></i> Kelola Testimoni
      </a>

      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-6 mb-2">Pengaturan</p>
      <a href="pengaturan.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition">
        <i class="ph-bold ph-gear text-xl"></i> Pengaturan Web
      </a>
    </div>

    <div class="p-4 border-t border-slate-800 shrink-0">
      <button id="logout-btn" class="w-full text-left text-sm text-red-400 hover:text-red-300 flex items-center gap-2 transition">
        <i class="ph-bold ph-sign-out"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
    <!-- Topbar -->
    <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 shrink-0">
      <div class="flex items-center gap-3">
        <button id="admin-mobile-menu-btn" class="md:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition">
          <i class="ph-bold ph-list text-2xl"></i>
        </button>
        <h2 class="text-xl font-bold text-slate-800">Kelola Promo</h2>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50">
      <div class="max-w-5xl mx-auto">
        <div id="status-message" class="hidden mb-6 p-4 rounded-xl text-sm font-medium"></div>

        <!-- Form Tambah -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
          <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Tambah Promo Baru</h3>
          <form id="promo-form" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Judul Promo</label>
                <input type="text" id="judul" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-light-blue">
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Pilih Label / Badge Promo</label>
                <select id="badge" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-light-blue font-medium">
                  <option value="Promo Spesial">🎁 Promo Spesial</option>
                  <option value="Diskon Kilat">⚡ Diskon Kilat</option>
                  <option value="Waktu Terbatas">⏳ Waktu Terbatas</option>
                  <option value="Hot Deal">🔥 Hot Deal</option>
                  <option value="Gratis Cek">🛠️ Gratis Cek</option>
                </select>
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1">Deskripsi Lengkap</label>
              <textarea id="deskripsi" required rows="2" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-light-blue"></textarea>
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1">Harga Promo / Teks Penawaran</label>
              <input type="text" id="harga_promo" required placeholder="Cth: Rp 120.000 atau Diskon 15%" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-light-blue">
            </div>
            
            <div class="flex justify-end pt-2">
              <button type="submit" id="save-btn" class="bg-brand-blue text-white px-6 py-2 rounded-lg font-bold hover:bg-slate-800 transition">
                Simpan Promo
              </button>
            </div>
          </form>
        </div>

        <!-- Tabel Data -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[800px]">
            <thead>
              <tr class="bg-slate-100 text-slate-600 text-sm">
                <th class="py-3 px-6 font-semibold">Label</th>
                <th class="py-3 px-6 font-semibold">Judul Promo</th>
                <th class="py-3 px-6 font-semibold">Penawaran</th>
                <th class="py-3 px-6 font-semibold text-center">Aksi</th>
              </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-slate-100 text-slate-700 text-sm">
              <tr>
                <td colspan="4" class="py-6 text-center text-slate-400">Memuat data...</td>
              </tr>
            </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script type="module">
    import { supabase } from '../src/supabase.js';
    import { logoutAdmin } from '../src/auth.js';
    
    document.getElementById('logout-btn').addEventListener('click', logoutAdmin);
    
    const form = document.getElementById('promo-form');
    const tableBody = document.getElementById('table-body');
    const statusMsg = document.getElementById('status-message');

    function showStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
      statusMsg.classList.add(type === 'success' ? 'bg-green-100' : 'bg-red-100');
      statusMsg.classList.add(type === 'success' ? 'text-green-700' : 'text-red-700');
      setTimeout(() => statusMsg.classList.add('hidden'), 3000);
    }

    async function loadData() {
      const { data, error } = await supabase.from('promos').select('*').order('id', { ascending: false });
      if (error) {
        tableBody.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-red-500">Gagal memuat data</td></tr>`;
        return;
      }
      
      tableBody.innerHTML = '';
      if(data.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-slate-400">Belum ada data promo.</td></tr>`;
        return;
      }

      data.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-50 transition';
        const hargaCoret = item.harga_awal ? `<span class="line-through text-slate-400 text-xs">${item.harga_awal}</span><br>` : '';
        
        tr.innerHTML = `
          <td class="py-3 px-6"><span class="bg-red-100 text-red-600 text-xs px-2 py-1 rounded font-bold">${item.badge}</span></td>
          <td class="py-3 px-6 font-bold text-slate-800">${item.judul}</td>
          <td class="py-3 px-6">
            ${hargaCoret}
            <span class="font-bold text-brand-light-blue">${item.harga_promo}</span>
          </td>
          <td class="py-3 px-6 text-center">
            <button onclick="window.deletePromo(${item.id})" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-lg">
              <i class="ph-bold ph-trash"></i>
            </button>
          </td>
        `;
        tableBody.appendChild(tr);
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        judul: document.getElementById('judul').value,
        badge: document.getElementById('badge').value,
        deskripsi: document.getElementById('deskripsi').value,
        harga_awal: null,
        harga_promo: document.getElementById('harga_promo').value
      };

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      const { error } = await supabase.from('promos').insert([payload]);
      
      btn.disabled = false;
      btn.textContent = 'Simpan Promo';

      if (error) {
        showStatus('Gagal menyimpan: ' + error.message, 'error');
      } else {
        showStatus('Promo berhasil ditambahkan!', 'success');
        form.reset();
        loadData();
      }
    });

    window.deletePromo = async (id) => {
      if(!confirm('Yakin ingin menghapus promo ini?')) return;
      const { error } = await supabase.from('promos').delete().eq('id', id);
      if(error) showStatus('Gagal menghapus: ' + error.message, 'error');
      else {
        showStatus('Data dihapus', 'success');
        loadData();
      }
    };

    loadData();
  </script>
</body>
</html>
